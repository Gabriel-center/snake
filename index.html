<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pixel Slither Royale</title>
    
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <style>
        /* === GLOBAL STYLES === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Press Start 2P', 'Courier New', monospace; user-select: none; touch-action: none; }
        body, html { width: 100%; height: 100%; background-color: #000; color: #fff; overflow: hidden; }
        .hidden { display: none !important; }

        /* === UI CONTAINERS === */
        .screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; }
        #main-menu, #player-login, #player-death { background-color: #000; }
        
        h1 { font-size: 2rem; margin-bottom: 30px; color: #fff; text-align: center; line-height: 1.5; }
        h2 { text-align: center; color: #fff; margin-bottom: 20px;}
        
        button { 
            padding: 20px 30px; margin: 15px; font-size: 1rem; font-weight: bold; 
            background-color: #000; color: #fff; border: 2px solid #fff; 
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
        }
        button:hover { background-color: #fff; color: #000; }

        input[type="text"] { 
            padding: 15px; font-size: 1rem; margin-bottom: 20px; text-align: center; 
            background: #111; color: #fff; border: 2px solid #555; outline: none;
        }
        
        .color-picker-group { display: flex; gap: 20px; margin-bottom: 20px; text-align: center; font-size: 0.7rem; }
        input[type="color"] { width: 60px; height: 50px; border: 2px solid #555; background: #000; cursor: pointer; }

        /* === HOST SPECIFIC === */
        canvas { position: absolute; top: 0; left: 0; display: block; image-rendering: pixelated; width: 100%; height: 100%; z-index: 1; }
        
        #host-lobby-ui { position: absolute; top: 20px; left: 20px; z-index: 5; background: rgba(0,0,0,0.8); padding: 20px; border: 2px solid #fff; }
        .settings-panel label { display: block; margin: 15px 0; font-size: 0.6rem; line-height: 2;}
        .settings-panel input[type="range"] { vertical-align: middle; width: 100px; }
        
        #btn-fullscreen { position: absolute; top: 20px; right: 20px; z-index: 10; padding: 10px; font-size: 0.8rem; }
        #countdown-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 6rem; color: #fff; z-index: 20; }

        /* === PLAYER MOBILE CONTROLS === */
        #player-controller { background: #000; }
        #mobile-stats-bar { position: absolute; top: 5%; width: 100%; text-align: center; font-size: 1rem; color: #fff; z-index: 5; pointer-events: none;}
        
        /* Control Zones */
        #left-controls { position: absolute; left: 0; top: 0; width: 50vw; height: 100vh; }
        #right-controls { position: absolute; right: 0; top: 0; width: 50vw; height: 100vh; }

        /* Visual Suggestions (Ghosts) */
        .control-ghost {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100px; height: 100px; border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            pointer-events: none; /* Let touches pass through */
            display: flex; justify-content: center; align-items: center;
            color: rgba(255, 255, 255, 0.2); font-size: 0.8rem;
        }

        /* Actual Dash Button (Moves to finger) */
        #dash-active-visual { 
            position: absolute; display: none;
            width: 120px; height: 120px; border-radius: 50%; background: rgba(255, 255, 255, 0.8); 
            border: 4px solid #fff; color: #000; font-size: 1rem; 
            justify-content: center; align-items: center; pointer-events: none;
            transform: translate(-50%, -50%);
        }

        /* === ROTATE PHONE OVERLAY === */
        #rotate-phone-overlay { 
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: #000; z-index: 9999; color: #fff; align-items: center; justify-content: center; 
            text-align: center; flex-direction: column;
        }
        @media screen and (orientation: portrait) {
            body.is-mobile-player #rotate-phone-overlay { display: flex; }
        }

        /* === DEATH SCREEN === */
        .death-stats { font-size: 0.8rem; margin: 30px 0; line-height: 2.5; text-align: center; }
    </style>
</head>
<body>

    <!-- 1. MAIN MENU -->
    <div id="main-menu" class="screen">
        <h1>PIXEL SLITHER<br>ROYALE</h1>
        <button id="btn-choose-host">HOST GAME (Screen)</button>
        <button id="btn-choose-join">JOIN GAME (Mobile)</button>
    </div>

    <!-- 2. HOST UI -->
    <div id="host-lobby-ui" class="hidden">
        <h2 style="font-size: 1.2rem;">CODE: <span id="display-room-code" style="color: #0f0;">-----</span></h2>
        <div class="settings-panel">
            <label>Start Width: <input type="range" id="set-width" min="1" max="10" value="3"> <span id="val-width">3px</span></label>
            <label>Max Food: <input type="range" id="set-max-food" min="50" max="300" value="100"> <span id="val-max-food">100</span></label>
            <label>Spawn Rate: <input type="range" id="set-food-rate" min="1" max="10" value="4"></label>
            <label>CPU Bots: <input type="number" id="set-bots" min="0" max="15" value="3" style="width: 50px;"></label>
        </div>
        <h3 style="font-size: 0.8rem; margin: 15px 0;">Players: <span id="player-count">0</span></h3>
        <button id="btn-start-game" style="margin: 0; padding: 15px; font-size: 0.8rem;">START BATTLE</button>
    </div>
    
    <button id="btn-fullscreen" class="hidden">[ FULLSCREEN ]</button>
    <div id="countdown-overlay" class="hidden">5</div>
    
    <canvas id="gameCanvas" class="hidden"></canvas>
    
    <!-- Hidden div for QR logic -->
    <div id="hidden-qr" style="display:none;"></div>

    <!-- 3. PLAYER LOGIN -->
    <div id="player-login" class="screen hidden">
        <h2>JOIN BATTLE</h2>
        <input type="text" id="input-room-code" placeholder="CODE" maxlength="5" style="text-transform: uppercase; width: 80%;">
        <input type="text" id="input-username" placeholder="USERNAME" maxlength="10" style="width: 80%;">
        
        <div class="color-picker-group">
            <div><p style="margin-bottom:5px;">BODY</p><input type="color" id="input-color" value="#00ff00"></div>
            <div><p style="margin-bottom:5px;">OUTLINE</p><input type="color" id="input-outline" value="#ffffff"></div>
        </div>

        <button id="btn-join-room">CONNECT</button>
        <p id="join-status" style="margin-top: 15px; font-size: 0.8rem;"></p>
    </div>

    <!-- 4. PLAYER CONTROLLER -->
    <div id="player-controller" class="screen hidden">
        <div id="mobile-stats-bar">SCORE: <span id="mobile-score">0</span></div>
        
        <div id="left-controls">
            <div class="control-ghost">DASH</div>
            <div id="dash-active-visual">>>></div>
        </div>
        
        <div id="right-controls">
            <div class="control-ghost">MOVE</div>
            <div id="joystick-zone"></div>
        </div>
    </div>

    <!-- 5. ROTATE PHONE PROMPT -->
    <div id="rotate-phone-overlay">
        <h2>ROTATE PHONE</h2>
        <p style="font-size:0.8rem; margin-top:20px;">Landscape Mode Required</p>
    </div>

    <!-- 6. PLAYER DEATH SCREEN -->
    <div id="player-death" class="screen hidden">
        <h1 style="color: #fff;">YOU DIED</h1>
        <div class="death-stats">
            <p>Time Alive: <span id="stat-time">0s</span></p>
            <p>Max Length: <span id="stat-length">0</span></p>
            <p>Score: <span id="stat-food">0</span></p>
        </div>
        <button id="btn-respawn">RESPAWN</button>
    </div>

    <script>
        /* =========================================================
           UTILS & SETTINGS
           ========================================================= */
        let hasEnteredFullscreen = false;
        function enterFullscreen() {
            if (hasEnteredFullscreen) return;
            let elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen().catch(()=>{}); } 
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            hasEnteredFullscreen = true;
            document.getElementById('btn-fullscreen').classList.add('hidden');
        }

        document.getElementById('btn-fullscreen').onclick = enterFullscreen;
        document.getElementById('set-width').oninput = (e) => document.getElementById('val-width').innerText = e.target.value + 'px';
        document.getElementById('set-max-food').oninput = (e) => document.getElementById('val-max-food').innerText = e.target.value;

        const screens =['main-menu', 'player-login', 'player-controller', 'player-death'];
        function switchScreen(screenId) {
            screens.forEach(id => document.getElementById(id).classList.add('hidden'));
            document.getElementById(screenId).classList.remove('hidden');
        }
        function generateId() { return Math.random().toString(36).substring(2, 7).toUpperCase(); }

        const urlParams = new URLSearchParams(window.location.search);
        const urlCode = urlParams.get('code');
        if (urlCode) {
            document.getElementById('input-room-code').value = urlCode.toUpperCase();
            switchScreen('player-login');
        }

        /* =========================================================
           GLOBAL VARIABLES & NETWORKING
           ========================================================= */
        let peer = null; let connection = null; 
        let roomCode = ''; let isHost = false;
        let hostConnections = {}; 
        let appState = 'MENU'; // MENU -> LOBBY -> GAME

        document.getElementById('btn-choose-host').onclick = initHost;
        document.getElementById('btn-choose-join').onclick = () => switchScreen('player-login');

        function initHost() {
            isHost = true;
            roomCode = generateId();
            appState = 'LOBBY';
            enterFullscreen(); 
            
            document.getElementById('main-menu').classList.add('hidden');
            document.getElementById('host-lobby-ui').classList.remove('hidden');
            document.getElementById('btn-fullscreen').classList.remove('hidden');
            canvas.classList.remove('hidden');
            
            document.getElementById('display-room-code').innerText = roomCode;

            const joinUrl = window.location.origin + window.location.pathname + '?code=' + roomCode;
            new QRCode(document.getElementById("hidden-qr"), { text: joinUrl, width: 200, height: 200, colorDark: "#000", colorLight: "#fff" });
            setTimeout(() => { qrImageCanvas = document.querySelector('#hidden-qr canvas'); }, 500);

            peer = new Peer(roomCode);
            peer.on('connection', (conn) => {
                conn.on('data', (data) => handleHostData(conn.peer, data, conn));
                conn.on('close', () => {
                    delete hostConnections[conn.peer];
                    document.getElementById('player-count').innerText = Object.keys(hostConnections).length;
                    snakes = snakes.filter(s => s.id !== conn.peer);
                });
            });

            resizeCanvas();
            requestAnimationFrame(gameLoop);
        }

        function handleHostData(peerId, data, conn) {
            if (data.type === 'join') {
                hostConnections[peerId] = conn;
                document.getElementById('player-count').innerText = Object.keys(hostConnections).length;
                spawnSnake(peerId, data.name, data.color, data.outline, false, conn);
            } 
            else if (data.type === 'input') {
                let snake = snakes.find(s => s.id === peerId);
                if (snake && !snake.isDead) {
                    snake.targetAngle = data.angle;
                    snake.isDashing = data.dash;
                }
            }
            else if (data.type === 'respawn') {
                spawnSnake(peerId, data.name, data.color, data.outline, false, conn);
            }
        }

        document.getElementById('btn-start-game').onclick = () => {
            enterFullscreen();
            document.getElementById('host-lobby-ui').classList.add('hidden');
            startGameEngine(); // Init settings
            startCountdown();
        };

        function startCountdown() {
            let overlay = document.getElementById('countdown-overlay');
            overlay.classList.remove('hidden');
            let count = 5; overlay.innerText = count;
            let interval = setInterval(() => {
                count--;
                if (count > 0) { overlay.innerText = count; } 
                else {
                    clearInterval(interval);
                    overlay.classList.add('hidden');
                    
                    // Circle Spawn
                    let radius = Math.min(canvas.width, canvas.height) * 0.35;
                    let angleStep = (Math.PI * 2) / Math.max(1, snakes.length);
                    snakes.forEach((s, idx) => {
                        s.x = canvas.width/2 + Math.cos(angleStep * idx) * radius;
                        s.y = canvas.height/2 + Math.sin(angleStep * idx) * radius;
                        s.angle = Math.atan2(canvas.height/2 - s.y, canvas.width/2 - s.x);
                        s.targetAngle = s.angle;
                        s.body =[]; s.maxLength = 50; 
                    });
                    appState = 'GAME';
                }
            }, 1000);
        }

        /* =========================================================
           HOST GAME ENGINE
           ========================================================= */
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false }); 
        let snakes =[], foods = [];
        let settings = { baseWidth: 3, maxFood: 100, foodRate: 5, bots: 3 };
        
        let qrBox = { x: 0, y: 0, w: 200, h: 200, vx: 0, vy: 0 };
        let qrImageCanvas = null;

        function resizeCanvas() { 
            canvas.width = window.innerWidth; canvas.height = window.innerHeight; 
            qrBox.x = canvas.width/2 - 100; qrBox.y = canvas.height/2 - 100;
        }
        window.addEventListener('resize', () => { if(isHost) resizeCanvas(); });

        class Snake {
            constructor(id, name, color, outlineColor, isBot = false, conn = null) {
                this.id = id; this.name = name || (isBot ? 'CPU' : 'P1'); 
                this.color = color; this.outlineColor = outlineColor || '#ffffff';
                this.isBot = isBot; this.conn = conn;
                
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.angle = Math.random() * Math.PI * 2;
                this.targetAngle = this.angle;
                
                this.body =[]; 
                this.maxLength = 50; 
                this.isDashing = false; this.dashTimer = 0; this.isDead = false;
                this.invulnTimer = 90; 
                
                this.score = 0; this.timeSpawned = Date.now(); this.maxAchievedLength = 50;
            }
        }

        function spawnSnake(id, name, color, outline, isBot = false, conn = null) {
            snakes = snakes.filter(s => s.id !== id);
            snakes.push(new Snake(id, name, color, outline, isBot, conn));
        }

        function spawnFood(x, y, size) {
            foods.push({
                x: x || Math.random() * canvas.width,
                y: y || Math.random() * canvas.height,
                size: size || (Math.random() < 0.1 ? 4 : 2),
                color: `hsl(${Math.random()*360}, 100%, 70%)`
            });
        }

        function killSnake(deadSnake) {
            deadSnake.isDead = true;
            deadSnake.body.forEach((segment, index) => {
                if (index % 10 === 0) spawnFood(segment.x, segment.y, 3); // Drop food on death
            });
            if (!deadSnake.isBot && deadSnake.conn) {
                deadSnake.conn.send({
                    type: 'death',
                    stats: {
                        time: Math.floor((Date.now() - deadSnake.timeSpawned) / 1000),
                        maxLen: Math.floor(deadSnake.maxAchievedLength),
                        score: deadSnake.score
                    }
                });
            }
        }

        function startGameEngine() {
            settings = {
                baseWidth: parseInt(document.getElementById('set-width').value),
                maxFood: parseInt(document.getElementById('set-max-food').value),
                foodRate: parseInt(document.getElementById('set-food-rate').value),
                bots: parseInt(document.getElementById('set-bots').value)
            };
            for (let i=0; i<settings.bots; i++) {
                spawnSnake('bot_'+i, 'CPU', `hsl(${Math.random()*360}, 100%, 50%)`, '#333333', true);
            }
            for (let i=0; i<settings.maxFood / 2; i++) spawnFood();
        }

        function gameLoop() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // === LOBBY QR PHYSICS ===
            if (appState === 'LOBBY' && qrImageCanvas) {
                ctx.fillStyle = '#fff';
                ctx.fillRect(qrBox.x - 4, qrBox.y - 4, qrBox.w + 8, qrBox.h + 8);
                ctx.drawImage(qrImageCanvas, qrBox.x, qrBox.y, qrBox.w, qrBox.h);
                qrBox.x += qrBox.vx; qrBox.y += qrBox.vy;
                qrBox.vx *= 0.92; qrBox.vy *= 0.92;
                if (qrBox.x < 0) { qrBox.x = 0; qrBox.vx *= -1; }
                if (qrBox.x + qrBox.w > canvas.width) { qrBox.x = canvas.width - qrBox.w; qrBox.vx *= -1; }
                if (qrBox.y < 0) { qrBox.y = 0; qrBox.vy *= -1; }
                if (qrBox.y + qrBox.h > canvas.height) { qrBox.y = canvas.height - qrBox.h; qrBox.vy *= -1; }
            }

            // === GAME LOGIC ===
            if (appState === 'GAME') {
                // Limit Max Food
                if (foods.length < settings.maxFood && Math.random() < settings.foodRate * 0.02) spawnFood();
                
                foods.forEach(f => {
                    ctx.fillStyle = f.color;
                    ctx.beginPath(); ctx.arc(f.x, f.y, f.size, 0, Math.PI*2); ctx.fill();
                });
            }

            // Update Snakes
            snakes.forEach(snake => {
                if (snake.isDead) return;
                if (snake.invulnTimer > 0) snake.invulnTimer--;

                // Dynamic Width Calculation (Slither-style girth)
                // Base width + (length / 50)
                let currentThickness = settings.baseWidth + (Math.min(snake.maxLength, 500) / 40);

                // Bot Logic (Improved)
                if (snake.isBot) {
                    if (appState === 'GAME') {
                        let closestFood = null; let minDist = Infinity;
                        foods.forEach(f => {
                            let d = Math.hypot(snake.x - f.x, snake.y - f.y);
                            // Smart AI: Only chase food inside a 120 degree cone in front (avoid spinning)
                            let angleToFood = Math.atan2(f.y - snake.y, f.x - snake.x);
                            let angleDiff = Math.abs(angleToFood - snake.angle);
                            if (angleDiff > Math.PI) angleDiff = (Math.PI * 2) - angleDiff;
                            
                            if (d < minDist && angleDiff < 1.5) { // < 1.5 radians is approx 85 degrees
                                minDist = d; closestFood = f; 
                            }
                        });

                        if (closestFood) snake.targetAngle = Math.atan2(closestFood.y - snake.y, closestFood.x - snake.x);
                        // Less Dash spamming for bots
                        snake.isDashing = (minDist < 60 && snake.maxLength > 80 && Math.random() < 0.05);
                    } else {
                        // Lobby wander
                        if (Math.random() < 0.05) snake.targetAngle += (Math.random() - 0.5);
                    }
                }

                // Turning Physics
                let diff = snake.targetAngle - snake.angle;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                // Turn speed slower as you get bigger
                let turnSpeed = Math.max(0.04, 0.1 - (currentThickness * 0.002));
                snake.angle += diff * turnSpeed; 

                // Speed Physics
                let speed = 2; // Default speed
                if (snake.isDashing && snake.maxLength > 20) {
                    speed = 4;
                    // Costly Dash
                    snake.dashTimer++;
                    if (snake.dashTimer > 5) { // Lose mass every 5 frames
                        snake.dashTimer = 0; 
                        snake.maxLength -= 1; 
                        if (snake.body.length > 0) {
                            let dropP = snake.body[snake.body.length-1];
                            spawnFood(dropP.x, dropP.y, 1);
                        }
                    }
                }

                snake.x += Math.cos(snake.angle) * speed;
                snake.y += Math.sin(snake.angle) * speed;

                if (snake.x < 0) snake.x += canvas.width;
                if (snake.x > canvas.width) snake.x -= canvas.width;
                if (snake.y < 0) snake.y += canvas.height;
                if (snake.y > canvas.height) snake.y -= canvas.height;

                // Lobby QR Collision
                if (appState === 'LOBBY' && qrImageCanvas) {
                    let cx = qrBox.x + qrBox.w/2; let cy = qrBox.y + qrBox.h/2;
                    if (Math.abs(snake.x - cx) < qrBox.w/2 + 10 && Math.abs(snake.y - cy) < qrBox.h/2 + 10) {
                        qrBox.vx += Math.cos(snake.angle) * 0.5;
                        qrBox.vy += Math.sin(snake.angle) * 0.5;
                    }
                }

                snake.body.unshift({x: snake.x, y: snake.y});
                // Calculate distance based on speed to prevent body gaps
                let historyLimit = Math.floor(snake.maxLength * (3/speed)); 
                if (snake.body.length > snake.maxLength) snake.body.pop();

                // Eat
                if (appState === 'GAME') {
                    for (let i = foods.length - 1; i >= 0; i--) {
                        let f = foods[i];
                        let d = Math.hypot(snake.x - f.x, snake.y - f.y);
                        if (d > canvas.width/2) continue;
                        // Hitbox grows with thickness
                        if (d < currentThickness + f.size) {
                            snake.maxLength += (f.size > 2 ? 5 : 1);
                            if (snake.maxLength > snake.maxAchievedLength) snake.maxAchievedLength = snake.maxLength;
                            snake.score += (f.size > 2 ? 5 : 1);
                            foods.splice(i, 1);
                            if (!snake.isBot && snake.conn) snake.conn.send({ type: 'score', score: snake.score });
                        }
                    }
                }

                snake.currentThickness = currentThickness; // Store for collision and drawing
            });

            // Collisions
            if (appState === 'GAME') {
                for (let i=0; i<snakes.length; i++) {
                    let sA = snakes[i];
                    if (sA.isDead || sA.invulnTimer > 0) continue;

                    for (let j=0; j<snakes.length; j++) {
                        let sB = snakes[j];
                        if (sA === sB || sB.isDead || sB.invulnTimer > 0) continue;

                        // Check body parts (skip head area)
                        for (let k = 15; k < sB.body.length; k++) {
                            let seg = sB.body[k];
                            let dx = Math.abs(sA.x - seg.x); let dy = Math.abs(sA.y - seg.y);
                            if (dx > canvas.width/2) dx = canvas.width - dx;
                            if (dy > canvas.height/2) dy = canvas.height - dy;

                            // Collision: Distance < (MyRadius + EnemyRadius)
                            // A safer collision is slightly smaller than visual radius to be forgiving
                            let collisionDist = sA.currentThickness + sB.currentThickness - 2; 
                            if (Math.hypot(dx, dy) < collisionDist) {
                                killSnake(sA);
                                break;
                            }
                        }
                        if (sA.isDead) break;
                    }
                }
            }

            // Draw Snakes
            snakes.forEach(snake => {
                if (snake.isDead) return;
                let isFlashing = snake.invulnTimer > 0 && Math.floor(Date.now() / 100) % 2 === 0;
                let strokeC = isFlashing ? '#fff' : snake.outlineColor;
                let fillC = isFlashing ? '#fff' : snake.color;
                
                // Draw Body (Tail to Head)
                // We skip points to optimize drawing and make it look like segments
                let step = Math.max(1, Math.floor(snake.currentThickness / 3));

                for (let i = snake.body.length - 1; i >= 0; i-=step) {
                    let p = snake.body[i];
                    let prev = (i + step < snake.body.length) ? snake.body[i+step] : p;
                    if (Math.abs(p.x - prev.x) > canvas.width/2 || Math.abs(p.y - prev.y) > canvas.height/2) continue;

                    ctx.beginPath();
                    ctx.arc(p.x, p.y, snake.currentThickness, 0, Math.PI*2);
                    ctx.fillStyle = fillC; ctx.fill();
                    ctx.strokeStyle = strokeC; ctx.lineWidth = 1; ctx.stroke();
                }

                // Head
                ctx.beginPath();
                ctx.arc(snake.x, snake.y, snake.currentThickness + 1, 0, Math.PI*2);
                ctx.fillStyle = fillC; ctx.fill();
                ctx.strokeStyle = strokeC; ctx.stroke();

                // Name
                if (appState === 'GAME') {
                    ctx.fillStyle = '#fff';
                    ctx.font = '10px "Press Start 2P"';
                    ctx.textAlign = 'center';
                    ctx.fillText(snake.name, Math.floor(snake.x), Math.floor(snake.y) - snake.currentThickness - 10);
                }
            });

            // Respawn Bots
            if (appState === 'GAME') {
                snakes = snakes.filter(s => {
                    if (!s.isDead) return true;
                    if (s.isBot) setTimeout(() => spawnSnake(s.id, s.name, s.color, s.outlineColor, true), 3000);
                    return false;
                });
            }
            requestAnimationFrame(gameLoop);
        }

        /* =========================================================
           PLAYER MOBILE LOGIC (Dynamic Touch)
           ========================================================= */
        let myName = '', myColor = '', myOutline = '';
        let joystickManager = null;
        let isDashing = false, currentAngle = 0, inputInterval = null;

        document.getElementById('btn-join-room').onclick = () => {
            enterFullscreen(); 
            document.body.classList.add('is-mobile-player');
            
            let code = document.getElementById('input-room-code').value.toUpperCase();
            myName = document.getElementById('input-username').value || 'P1';
            myColor = document.getElementById('input-color').value;
            myOutline = document.getElementById('input-outline').value;
            let status = document.getElementById('join-status');

            if (code.length !== 5) { status.innerText = "CODE MUST BE 5 LETTERS"; return; }
            status.innerText = "CONNECTING...";
            
            peer = new Peer(); 
            peer.on('open', () => {
                connection = peer.connect(code);
                connection.on('open', () => {
                    status.innerText = "CONNECTED!";
                    connection.send({ type: 'join', name: myName, color: myColor, outline: myOutline });
                    initPlayerController();
                });
                connection.on('data', (data) => {
                    if (data.type === 'death') showDeathScreen(data.stats);
                    else if (data.type === 'score') document.getElementById('mobile-score').innerText = data.score;
                });
                connection.on('error', () => status.innerText = "CONNECTION FAILED.";);
            });
        };

        function initPlayerController() {
            switchScreen('player-controller');
            document.getElementById('mobile-score').innerText = '0';

            // DYNAMIC JOYSTICK (Right Side)
            if (joystickManager) joystickManager.destroy();
            joystickManager = nipplejs.create({
                zone: document.getElementById('right-controls'),
                mode: 'dynamic', // Creates joystick wherever you touch
                color: '#ffffff',
                size: 120
            });
            joystickManager.on('move', (evt, data) => { currentAngle = -data.angle.radian; });

            // DYNAMIC DASH (Left Side)
            let leftZone = document.getElementById('left-controls');
            let dashVisual = document.getElementById('dash-active-visual');

            leftZone.addEventListener('touchstart', (e) => {
                e.preventDefault();
                let touch = e.changedTouches[0];
                isDashing = true;
                dashVisual.style.display = 'flex';
                dashVisual.style.left = touch.clientX + 'px';
                dashVisual.style.top = touch.clientY + 'px';
            }, {passive: false});

            leftZone.addEventListener('touchmove', (e) => {
                e.preventDefault();
                let touch = e.changedTouches[0];
                dashVisual.style.left = touch.clientX + 'px';
                dashVisual.style.top = touch.clientY + 'px';
            }, {passive: false});

            leftZone.addEventListener('touchend', (e) => {
                e.preventDefault();
                isDashing = false;
                dashVisual.style.display = 'none';
            }, {passive: false});

            // Start Input Loop
            if (inputInterval) clearInterval(inputInterval);
            inputInterval = setInterval(() => {
                if (connection && connection.open) {
                    connection.send({ type: 'input', angle: currentAngle, dash: isDashing });
                }
            }, 50);
        }

        function showDeathScreen(stats) {
            if (inputInterval) clearInterval(inputInterval);
            switchScreen('player-death');
            document.getElementById('stat-time').innerText = stats.time + 's';
            document.getElementById('stat-length').innerText = stats.maxLen;
            document.getElementById('stat-food').innerText = stats.score;
        }

        document.getElementById('btn-respawn').onclick = () => {
            enterFullscreen();
            if (connection && connection.open) {
                connection.send({ type: 'respawn', name: myName, color: myColor, outline: myOutline });
                initPlayerController();
            }
        };
    </script>
</body>
</html>
